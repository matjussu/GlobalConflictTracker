name: GlobalConflictTracker

options:
  bundleIdPrefix: com.lepietre
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 11.0.0

targets:
  GlobalConflictTracker:
    type: application
    platform: iOS
    sources:
      - path: GlobalConflictTracker
        excludes:
          - "Resources/SETUP_GUIDE.md"
    resources:
      - path: GlobalConflictTracker/GoogleService-Info.plist
      - path: GlobalConflictTracker/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lepietre.GlobalConflictTracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseMessaging
      - package: FirebaseSDK
        product: FirebaseStorage
